[package]
name = "xidlc"
version = "0.1.0"
edition = "2024"

[dependencies]
xidl-parser = { workspace = true }
xidl-jsonrpc = { workspace = true }
xidl-xcdr = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
miette = { version = "7.6.0", features = ["fancy"] }
minijinja = { version = "2.14", features = ["loader"] }
convert_case = "0.10"
clap = { version = "4.5", features = ["derive"] }
rust-embed = "8.5"
interprocess = "2.2.3"
md5 = "0.7"
scopeguard = "1.2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
itertools = "0.14.0"
tree-sitter = "=0.25.0"
tree-sitter-highlight = "0.25.0"
tree-sitter-idl = "3.14.0"
tree-sitter-rust = "0.23.3"
tree-sitter-cpp = "0.23.3"

utoipa = "5.4.0"

[dev-dependencies]
insta = "1.44"
