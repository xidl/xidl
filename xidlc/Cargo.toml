[package]
name = "xidlc"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
exclude = ["**/*.snap"]

[lints]
workspace = true

[dependencies]
async-trait.workspace = true
xidl-parser.workspace = true
xidl-xcdr.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true

xidl-jsonrpc = { version = "0.34.0", path = "../xidl-jsonrpc", default-features = false, features = [
  "tokio",
  "tokio-net",
] }
miette = { version = "7.6.0", features = ["fancy"] }
minijinja = { workspace = true, features = ["loader"] }
convert_case = { workspace = true }
clap = { workspace = true, features = ["derive"] }
rust-embed.workspace = true
scopeguard = "1.2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
itertools = "0.14.0"
tree-sitter.workspace = true
tree-sitter-highlight = "=0.25.0"
owo-colors = "4.2"
tree-sitter-idl = { workspace = true }
tree-sitter-rust = "=0.23.3"
tree-sitter-cpp = "=0.23.4"
tree-sitter-typescript = "=0.23.2"
md5.workspace = true

utoipa = "5.4.0"
semver = "1.0"
jiff = "0.2"
enum_dispatch = "0.3.13"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
insta.workspace = true

[features]
default = ["fmt"]
fmt = ["fmt-rust", "fmt-cpp", "fmt-typescript"]
fmt-rust = []
fmt-cpp = []
fmt-typescript = []
