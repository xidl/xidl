[package]
name = "xidlc"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
exclude = ["**/*.snap"]

[features]
default = []
fmt = ["fmt-rust", "fmt-cpp", "fmt-typescript"]
fmt-rust = ["tree-sitter-rust"]
fmt-cpp = ["tree-sitter-cpp"]
fmt-typescript = ["tree-sitter-typescript"]

[lints]
workspace = true

[dependencies]
async-trait.workspace = true
xidl-parser.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true

xidl-jsonrpc = { version = "0.34.0", path = "../xidl-jsonrpc", default-features = false, features = [
  "tokio",
] }
miette = { version = "7.6.0", features = ["fancy"] }
minijinja = { workspace = true, features = ["loader"] }
convert_case = { workspace = true }
clap = { workspace = true, features = ["derive"] }
rust-embed.workspace = true
scopeguard = "1.2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
itertools = "0.14.0"
tree-sitter.workspace = true
tree-sitter-highlight = "=0.25.0"
owo-colors = "4.2"
tree-sitter-idl = { workspace = true }
tree-sitter-rust = { version = "=0.23.3", optional = true }
tree-sitter-cpp = { version = "=0.23.4", optional = true }
tree-sitter-typescript = { version = "=0.23.2", optional = true }
md5.workspace = true
indexmap = { version = "2", features = ["serde"] }

semver = "1.0"
jiff = "0.2"
enum_dispatch = "0.3.13"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
insta = { workspace = true, features = ["json", "redactions"] }
