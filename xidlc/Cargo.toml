[package]
name = "xidlc"
version.workspace = true
edition.workspace = true
description.workspace = true
license.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
exclude = ["**/*.snap"]

[lints]
workspace = true

[dependencies]
async-trait.workspace = true
xidl-parser.workspace = true
xidl-xcdr.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true

xidl-jsonrpc = { version = "0.3.0", path = "../xidl-jsonrpc", default-features = false, features = [
  "tokio",
] }
miette = { version = "7.6.0", features = ["fancy"] }
minijinja = { version = "2.14", features = ["loader"] }
convert_case = "0.11"
clap = { version = "4.5", features = ["derive"] }
rust-embed = "8.5"
md5 = "0.8"
scopeguard = "1.2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
itertools = "0.14.0"
tree-sitter = "=0.25.0"
tree-sitter-highlight = "=0.25.0"
owo-colors = "4.2"
tree-sitter-idl = "=3.14.0"
tree-sitter-rust = "=0.23.3"
tree-sitter-cpp = "=0.23.4"
tree-sitter-typescript = "=0.23.2"

utoipa = "5.4.0"
semver = "1.0"
jiff = "0.2"
enum_dispatch = "0.3.13"

[target.'cfg(target_os = "emscripten")'.dependencies]
tokio = { version = "1.36", features = [
  "sync",
  "macros",
  "io-util",
  "rt",
  "time",
] }

[target.'cfg(not(target_os = "emscripten"))'.dependencies]
interprocess = { version = "2.2.3", features = ["tokio"] }
tokio = { version = "1.36", features = ["full"] }

[dev-dependencies]
insta = "1.44"
