[package]
name = "xidlc"
version = "0.1.0"
edition = "2024"

[dependencies]
xidl-parser = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
minijinja = { version = "2.14", features = ["loader"] }
clap = { version = "4.5", features = ["derive"] }
rust-embed = "8.5"
interprocess = "2.2.3"

[dev-dependencies]
insta = "1.44"
