name: publish-release

on:
  release:
    types: [published]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTUP_MAX_RETRIES: 10

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  release-targets:
    name: Release Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Define release targets
        id: targets
        run: |
          matrix="$(python3 -c 'import json, sys; print(json.dumps(json.load(open(sys.argv[1], encoding="utf-8")), separators=(",", ":")))' .github/release-targets.json)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  resolve-publish-context:
    name: Resolve Publish Context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      should_ensure_release: ${{ steps.resolve.outputs.should_ensure_release }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - name: Resolve publish target
        id: resolve
        env:
          CURRENT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "release" ]]; then
            release_tag="${RELEASE_EVENT_TAG}"
            source_ref="${release_tag}"
            should_ensure_release="false"
            release_name="${release_tag}"
          elif [[ "${EVENT_NAME}" == "schedule" ]]; then
            release_tag="nightly"
            source_ref="${DEFAULT_BRANCH}"
            should_ensure_release="true"
            release_name="nightly"
          else
            if [[ "${CURRENT_REF}" != "refs/heads/${DEFAULT_BRANCH}" ]]; then
              echo "workflow_dispatch must run on ${DEFAULT_BRANCH}" >&2
              exit 1
            fi
            release_tag="nightly"
            source_ref="${DEFAULT_BRANCH}"
            should_ensure_release="true"
            release_name="nightly"
          fi

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_ref=refs/tags/${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "should_ensure_release=${should_ensure_release}" >> "$GITHUB_OUTPUT"
          echo "source_ref=${source_ref}" >> "$GITHUB_OUTPUT"

  ensure-managed-release:
    name: Ensure Managed Release
    needs: resolve-publish-context
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source ref
        if: needs.resolve-publish-context.outputs.should_ensure_release == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-publish-context.outputs.source_ref }}

      - name: Generate release body
        if: needs.resolve-publish-context.outputs.should_ensure_release == 'true'
        run: |
          mkdir -p release
          sed \
            -e "s|REPOSITORY|${GITHUB_REPOSITORY}|g" \
            -e "s|RELEASE_TAG|${{ needs.resolve-publish-context.outputs.release_tag }}|g" \
            ./.github/release_template.md > release/body.md

      - name: Create or update managed prerelease
        if: needs.resolve-publish-context.outputs.should_ensure_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NAME: ${{ needs.resolve-publish-context.outputs.release_name }}
          RELEASE_TAG: ${{ needs.resolve-publish-context.outputs.release_tag }}
          SOURCE_REF: ${{ needs.resolve-publish-context.outputs.source_ref }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes-file release/body.md \
              --prerelease \
              --target "$SOURCE_REF"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes-file release/body.md \
              --prerelease \
              --latest=false \
              --target "$SOURCE_REF"
          fi

  upload-assets:
    needs:
      - release-targets
      - resolve-publish-context
      - ensure-managed-release
    name: ${{ matrix.target }}
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-targets.outputs.matrix) }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-publish-context.outputs.source_ref }}

      - name: Setup CLI build toolchain
        uses: ./.github/actions/setup-cli-build
        with:
          target: ${{ matrix.target }}
          use_cross: ${{ matrix.use_cross }}
          setup_cross_toolchain: ${{ matrix.setup_cross_toolchain }}

      - uses: taiki-e/upload-rust-binary-action@v1.29.1
        with:
          package: xidlc
          bin: xidlc
          profile: release
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.resolve-publish-context.outputs.release_ref }}
          features: fmt,cli
