name: publish-release

on:
  release:
    types: [published]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  release-targets:
    name: Release Targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Define release targets
        id: targets
        run: |
          echo "matrix=$(python3 -c 'import json, sys; print(json.dumps(json.load(open(sys.argv[1])), separators=(\",\", \":\")))' .github/release-targets.json)" >> "$GITHUB_OUTPUT"

  upload-assets:
    needs: release-targets
    name: ${{ matrix.target }}
    permissions:
      contents: write
    if: github.repository_owner == 'xidl' && github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-targets.outputs.matrix) }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Setup CLI build toolchain
        uses: ./.github/actions/setup-cli-build
        with:
          target: ${{ matrix.target }}
          use_cross: ${{ matrix.use_cross }}
          setup_cross_toolchain: ${{ matrix.setup_cross_toolchain }}

      - uses: taiki-e/upload-rust-binary-action@v1.29.1
        with:
          package: xidlc
          bin: xidlc
          profile: release
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  nightly-build-cli:
    needs: release-targets
    name: nightly-${{ matrix.target }}
    if: github.repository_owner == 'xidl' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.release-targets.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CLI build toolchain
        uses: ./.github/actions/setup-cli-build
        with:
          target: ${{ matrix.target }}
          use_cross: ${{ matrix.use_cross }}
          setup_cross_toolchain: ${{ matrix.setup_cross_toolchain }}

      - name: Build xidlc (cross)
        if: matrix.use_cross
        run: cross build -p xidlc --target ${{ matrix.target }} --profile release

      - name: Build xidlc (cargo)
        if: matrix.use_cross == false
        run: cargo build -p xidlc --target ${{ matrix.target }} --profile release

      - name: Package cli artifact (Unix)
        if: ${{ !endsWith(matrix.target, 'windows-msvc') }}
        run: |
          mkdir -p dist
          tar -czf dist/xidlc-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release xidlc

      - name: Package cli artifact (Windows)
        if: endsWith(matrix.target, 'windows-msvc')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/xidlc.exe" -DestinationPath "dist/xidlc-${{ matrix.target }}.zip" -Force

      - name: Upload cli artifact
        uses: actions/upload-artifact@v7
        with:
          name: xidlc-${{ matrix.target }}
          path: dist/*

  nightly-release:
    name: nightly-release
    needs: nightly-build-cli
    if: github.repository_owner == 'xidl' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release body
        run: |
          mkdir -p release
          sed \
            -e "s|REPOSITORY|${GITHUB_REPOSITORY}|g" \
            -e "s|RELEASE_TAG|nightly|g" \
            ./.github/release_template.md > release/body.md

      - name: Release nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          files: |
            dist/*/*.tar.gz
            dist/*/*.zip
          body_path: release/body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
