name: publish-release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    if: github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true
          - runner: ubuntu-latest
            target: riscv64gc-unknown-linux-musl
            use_cross: true
          - runner: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use_cross: true
          # - runner: ubuntu-latest
          #   target: aarch64-pc-windows-gnullvm
          #   use_cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
    name: build-cli-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cross
          git: https://github.com/cross-rs/cross
          rev: 8633ec65ab914015c2444c732568b414bd3c47cf

      - name: Build xidlc (cross)
        if: matrix.platform.use_cross
        run: cross build -p xidlc --target ${{ matrix.platform.target }} --profile release

      - name: Build xidlc (cargo)
        if: matrix.platform.use_cross == false
        run: cargo build -p xidlc --target ${{ matrix.platform.target }} --profile release

      - name: Package cli artifact
        run: |
          mkdir -p dist
          BIN_NAME=xidlc
          if [ "${{ matrix.platform.target }}" = "x86_64-pc-windows-gnu" ] || [ "${{ matrix.platform.target }}" = "aarch64-pc-windows-gnu" ]; then
            BIN_NAME="xidlc.exe"
          fi
          tar -czf dist/xidlc-${{ matrix.platform.target }}.tar.gz -C target/${{ matrix.platform.target }}/release ${BIN_NAME}
      - name: Upload cli artifact
        uses: actions/upload-artifact@v7
        with:
          name: xidlc-${{ matrix.platform.target }}
          path: dist/*.tar.gz

  release:
    needs:
      - build-cli
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release body
        run: |
          mkdir -p release
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Skip release body for ref ${GITHUB_REF}"
            exit 0
          fi
          RELEASE_TAG="nightly"

          sed \
            -e "s|REPOSITORY|${GITHUB_REPOSITORY}|g" \
            -e "s|RELEASE_TAG|${RELEASE_TAG}|g" \
            ./.github/release_template.md > release/body.md

      - name: Release nightly
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          files: dist/*/*.tar.gz
          body_path: release/body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
