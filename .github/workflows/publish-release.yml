name: publish-release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - runner: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use_cross: true
          # - runner: ubuntu-latest
          #   target: aarch64-pc-windows-gnullvm
          #   use_cross: true
          - runner: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
    name: build-cli-${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        if: matrix.platform.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build xidlc (cross)
        if: matrix.platform.use_cross
        run: cross build -p xidlc --target ${{ matrix.platform.target }} --profile release

      - name: Build xidlc (cargo)
        if: matrix.platform.use_cross == false
        run: cargo build -p xidlc --target ${{ matrix.platform.target }} --profile release

      - name: Package cli artifact
        run: |
          mkdir -p dist
          BIN_NAME=xidlc
          if [ "${{ matrix.platform.target }}" = "x86_64-pc-windows-gnu" ] || [ "${{ matrix.platform.target }}" = "aarch64-pc-windows-gnu" ]; then
            BIN_NAME="xidlc.exe"
          fi
          cp target/${{ matrix.platform.target }}/release/${BIN_NAME} dist/xidlc-${{ matrix.platform.target }}${BIN_NAME##xidlc}
      - name: Upload cli artifact
        uses: actions/upload-artifact@v4
        with:
          name: xidlc-${{ matrix.platform.target }}
          path: dist/*

  release:
    needs:
      - build-cli
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Pack artifacts to tar.xz
        run: |
          mkdir -p release
          find dist -maxdepth 3 -type f -print0 | while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            tar -cJf "release/${base}.tar.xz" -C "$(dirname "$file")" "$base"
          done

      - name: Release nightly
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly
          prerelease: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
