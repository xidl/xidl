name: check-bddtest

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  bddtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: golang/xidlc-examples/go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: BDD test
        run: |
          make test-bdd
