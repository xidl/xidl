name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: "pnpm"
          cache-dependency-path: typescript/xidl-typescript-codec/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: typescript/xidl-typescript-codec/

      - name: Build package
        run: pnpm build
        working-directory: typescript/xidl-typescript-codec/

      - name: Publish package
        working-directory: typescript/xidl-typescript-codec/
        run: |
          cp ../../README.md .
          cp ../../LICENSE .
          npm publish --registry=https://registry.npmjs.org/
