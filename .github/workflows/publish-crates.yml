name: publish-crates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Publish crates to crates.io
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not set"
            exit 1
          fi

          publish_crate() {
            local crate="$1"
            local log_file
            log_file="$(mktemp)"

            echo "Publishing ${crate}..."
            if cargo publish -p "${crate}" --locked 2>&1 | tee "${log_file}"; then
              return 0
            fi

            if grep -Eqi "already uploaded|already exists" "${log_file}"; then
              echo "${crate} already published for this version, skip"
              return 0
            fi

            echo "Failed publishing ${crate}"
            return 1
          }

          # Publish in dependency order for workspace crates.
          crates=(
            xidl-parser-derive
            xidl-parser
            xidl-xcdr
            xidl-typeobject
            xidl-jsonrpc
            xidl-rust-axum
            xidlc
            xidl-build
          )

          for crate in "${crates[@]}"; do
            publish_crate "${crate}"
            sleep 10
          done
