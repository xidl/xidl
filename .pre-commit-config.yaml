# See https://pre-commit.com/hooks.html for more hooks
exclude: ^(tests/snapshots)|(xidl-xcdr/include/xidl_xcdr.h)|(.*.snap)|(xidlc-examples/api/.*.json)|(CHANGELOG.md)$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: xidlc-fmt
        name: xidlc fmt
        language: system
        files: ^(xidlc-examples/api/|golang/xidlc-examples/api/|xidlc/src/jsonrpc/|xidl-typeobject/idl/).+\.idl$
        entry: cargo run -p xidlc --features cli,fmt -- fmt --inplace --lang idl
      - id: rustfmt
        name: rustfmt
        language: system
        types_or: [rust]
        entry: cargo fmt
        files: \.rs$
        pass_filenames: false

  - repo: local
    hooks:
      - id: toml
        name: toml
        language: system
        types_or: [toml]
        entry: taplo format

  - repo: https://github.com/biomejs/pre-commit
    rev: "v2.4.10"
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.10"]
        exclude: "CHANGELOG.md"

  - repo: https://github.com/bneijt/deno-pre-commit
    rev: 2.7.9
    hooks:
      - id: deno-fmt
        exclude: ^README\.md$
        exclude_types: ["javascript", "jsx", "ts", "tsx", "json"]
