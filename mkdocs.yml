site_name: XIDL
site_url: https://xidl.github.io/xidl/
repo_url: https://github.com/xidl/xidl

nav:
  - Overview: index.md
  - User Guides:
      - Overview: user/index.md
      - Installation: user/install.md
      - Using xidlc: user/xidlc.md
      - Using xidl-build: user/xidl-build.md
      - IDL Guide: user/idl.md
      - HTTP Guide: user/http.md
      - JSON-RPC Guide: user/jsonrpc.md
      - Axum Target Note: rust-axum.md
      - Rust JSON-RPC Target Note: rust-jsonrpc.md
  - Reference:
      - Overview: reference/index.md
      - IDL Elements: reference/idl-elements.md
      - Annotations: reference/annotations.md
      - Pragmas: reference/pragmas.md
      - Targets: reference/targets.md
      - OpenAPI Metadata Note: openapi.md
      - XIDL Extensions: xidl-extend.md
      - XCDR Background: xcdr.md
      - Legacy Pragma Note: pragma.md
  - RFCs:
      - HTTP: rfc/http.md
      - HTTP Security: rfc/http-security.md
      - HTTP Stream: rfc/http-stream.md
      - JSONRPC: rfc/jsonrpc.md
      - JSONRPC Stream: rfc/jsonrpc-stream.md
  - Development:
      - Overview: development/index.md
      - Documentation Audit: development/doc-audit.md
      - Plugin Development: plugin.md
      - Architecture: architecture.md
  - AI Skills:
      - XIDL Skill: ai/index.md

theme:
  name: material
  language: en
  features:
    - search.suggest
    - search.highlight
  logo: assets/log.png
  favicon: assets/log.png
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - admonition
  - callouts
  - github-callouts
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - include-markdown:
      preserve_includer_indent: false
  - kroki:
      file_types:
        - svg
      fence_prefix: ""
      enable_diagramsnet: true
