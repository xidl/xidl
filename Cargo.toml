[package]
name = "idl_rs"
version = "0.1.0"
edition = "2021"

[workspace]
members = ["crates/derive", "crates/idlc"]

[dependencies]
tree-sitter = "=0.25.0"
tree-sitter-idl = "3.12.1"
derive = { path = "crates/derive" }
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
insta = "1.44"
