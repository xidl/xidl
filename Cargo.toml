[workspace]
resolver = "2"
members = [
  "xidl-build",
  "xidl-parser-derive",
  "xidl-jsonrpc",
  "xidl-rust-axum",
  "xidlc",
  "xidl-parser",
  "xidl-xcdr",
  "xidl-typeobject",
]

[workspace.dependencies]
xidl-parser = { path = "xidl-parser" }
xidl-parser-derive = { path = "xidl-parser-derive" }
xidl-xcdr = { path = "xidl-xcdr" }
xidl-jsonrpc = { path = "xidl-jsonrpc" }
xidl-rust-axum = { path = "xidl-rust-axum" }
