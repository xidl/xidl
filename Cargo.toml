[workspace]
resolver = "2"
members = [
  "xidl-derive",
  "xidl-jsonrpc",
  "xidlc",
  "xidl-parser",
  "xidl-xcdr",
  "xidl-typeobject",
]

[workspace.dependencies]
xidl-parser = { path = "xidl-parser" }
xidl-derive = { path = "xidl-derive" }
xidl-xcdr = { path = "xidl-xcdr" }
xidl-jsonrpc = { path = "xidl-jsonrpc" }
