[package]
name = "xidl-jsonrpc"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
tokio = { version = "1.36", features = [
  "sync",
  "macros",
  "io-util",
  "net",
  "rt",
  "time",
] }

[dev-dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1.36", features = ["full"] }
