[package]
name = "xidl-jsonrpc"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1.89"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
tokio = { version = "1.36", optional = true, features = [
  "sync",
  "io-util",
  "rt",
  "time",
] }

[features]
default = ["tokio"]
tokio = ["dep:tokio"]
tokio-net = ["tokio", "tokio/net"]

[dev-dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1.36", features = ["full"] }
